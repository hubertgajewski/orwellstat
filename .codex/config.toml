sandbox_mode = "workspace-write"

[mcp_servers.MCP_DOCKER]
args = [
    "mcp",
    "gateway",
    "run",
]
command = "docker"

[mcp_servers.coverage-matrix]
args = ["mcp/coverage-matrix/dist/index.js"]
command = "node"

[mcp_servers.coverage-matrix.tools.get_coverage_gaps]
approval_mode = "approve"

[mcp_servers.coverage-matrix.tools.get_coverage_summary]
approval_mode = "approve"

[mcp_servers.coverage-matrix.tools.mark_covered]
approval_mode = "approve"

[mcp_servers.playwright]
args = ["@playwright/mcp@0.0.68"]
command = "npx"

[mcp_servers.playwright-report-mcp]
args = [
    "--min-release-age=0",
    "playwright-report-mcp@3.2.1",
]
command = "npx"

[mcp_servers.playwright-report-mcp.env]
PW_ALLOWED_DIRS = ".."

[mcp_servers.playwright-report-mcp.tools.run_tests]
approval_mode = "approve"

[mcp_servers.playwright-report-mcp.tools.list_tests]
approval_mode = "approve"

[mcp_servers.playwright-report-mcp.tools.get_failed_tests]
approval_mode = "approve"

[mcp_servers.playwright-report-mcp.tools.get_test_attachment]
approval_mode = "approve"

[mcp_servers.quality-metrics]
args = ["mcp/quality-metrics/dist/index.js"]
command = "node"

[mcp_servers.quality-metrics.tools.get_defect_escape_rate]
approval_mode = "approve"

[mcp_servers.quality-metrics.tools.get_mttr]
approval_mode = "approve"

[mcp_servers.quality-metrics.tools.get_metrics_history]
approval_mode = "approve"
