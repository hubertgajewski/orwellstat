version: 2
updates:
  - package-ecosystem: npm
    directory: /bruno
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    labels: [dependencies]
    groups:
      all:
        patterns: ["*"]
  - package-ecosystem: npm
    directory: /playwright/typescript
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    labels: [dependencies]
    groups:
      all:
        patterns: ["*"]
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    labels: [dependencies]
    groups:
      all:
        patterns: ["*"]
