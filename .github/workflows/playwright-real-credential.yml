name: Playwright Real-Credential Test
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    # Runs at 03:00 UTC every Sunday — matches the standard Playwright Typescript workflow.
    - cron: "0 3 * * 0"
  workflow_dispatch:
    inputs:
      env:
        description: 'Target environment (staging = auto-approve, production = requires reviewer approval)'
        required: false
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      ref:
        description: "Branch to run on (defaults to triggering branch)"
        required: false
        default: ""
      runner:
        description: "Runner override (leave empty to use the RUNNER repo variable)"
        required: false
        default: ""
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Runs `tests/zone-admin.spec.ts` → "admin page - password mismatch (real
# credential)" under `playwright.config.real-credential.ts` (retries: 0,
# trace/screenshot/video: 'off') so the form-encoded POST body that contains
# `ORWELLSTAT_PASSWORD` cannot be captured in any published artefact on a CI
# flake — see #410. The same kill-switch (`PLAYWRIGHT_TYPESCRIPT == 'true'`)
# and approval gate as the sibling `playwright-typescript.yml` workflow apply.

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-approval:
    if: github.repository == 'hubertgajewski/orwellstat' && vars.PLAYWRIGHT_TYPESCRIPT == 'true' && github.event_name != 'workflow_dispatch'
    runs-on: ${{ inputs.runner || vars.RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 2
    permissions:
      pull-requests: read
    outputs:
      approved: ${{ steps.check.outputs.approved }}
    steps:
      - name: Check for PR approval
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          # Non-PR events (push, schedule, workflow_dispatch) bypass the approval gate.
          if [ -z "$PR_NUMBER" ]; then
            echo "approved=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Reviews are append-only history. A user's latest decisional review
          # (APPROVED/CHANGES_REQUESTED/DISMISSED) is authoritative; COMMENTED is ignored.
          # Gate opens only if ≥1 user's latest is APPROVED and no user's latest is CHANGES_REQUESTED.
          RESULT=$(gh api --paginate "repos/$GITHUB_REPOSITORY/pulls/$PR_NUMBER/reviews?per_page=100" \
            | jq '
              [.[] | select(.state == "APPROVED" or .state == "CHANGES_REQUESTED" or .state == "DISMISSED")]
              | group_by(.user.login)
              | map(max_by(.submitted_at) | .state)
              | (any(. == "APPROVED")) and (all(. != "CHANGES_REQUESTED"))
            ')
          if [ "$RESULT" = "true" ]; then
            echo "approved=true" >> "$GITHUB_OUTPUT"
          else
            echo "approved=false" >> "$GITHUB_OUTPUT"
          fi

  test:
    needs: check-approval
    # No `always()` / `!cancelled()` here — implicit `success()` keeps the job from running if
    # `check-approval` errored, which is the safer default for a job that fills the real
    # password. `check-approval` is skipped (not failed) on `workflow_dispatch` events via its
    # own `if:`, and skipped-via-`if:` is treated as a pass by implicit `success()`.
    if: |
      github.repository == 'hubertgajewski/orwellstat'
      && vars.PLAYWRIGHT_TYPESCRIPT == 'true'
      && (github.event_name == 'workflow_dispatch' || needs.check-approval.outputs.approved == 'true')
    runs-on: ${{ inputs.runner || vars.RUNNER || 'ubuntu-latest' }}
    environment: ${{ inputs.env || 'staging' }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.ref }}
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: "npm"
          cache-dependency-path: playwright/typescript/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: playwright/typescript
      - name: Install Playwright Chromium
        # The dedicated config restricts the matrix to a single Chromium project — chromium
        # is the only browser binary needed.
        run: npx playwright install --with-deps chromium
        working-directory: playwright/typescript
      - name: Run real-credential test
        # `REAL_CREDENTIAL_RUN=true` opens the per-describe `test.skip` gate in
        # `tests/zone-admin.spec.ts`. The dedicated config sets retries: 0 and
        # trace/screenshot/video: 'off' so a flake cannot publish the password.
        run: npx playwright test --config=playwright.config.real-credential.ts
        working-directory: playwright/typescript
        env:
          REAL_CREDENTIAL_RUN: 'true'
          ENV: ${{ vars.ENV }}
          ORWELLSTAT_USER: ${{ secrets.ORWELLSTAT_USER }}
          ORWELLSTAT_PASSWORD: ${{ secrets.ORWELLSTAT_PASSWORD }}
          BASIC_AUTH_USER: ${{ inputs.env == 'staging' && secrets.BASIC_AUTH_USER || '' }}
          BASIC_AUTH_PASSWORD: ${{ inputs.env == 'staging' && secrets.BASIC_AUTH_PASSWORD || '' }}
      - name: Detect local act runner
        id: detect-act
        if: ${{ !cancelled() }}
        run: |
          if [ "${ACT}" = "true" ]; then
            echo "running=true" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/upload-artifact@v7
        # Only the HTML report is uploaded — no trace/screenshot/video/blob/self-healing
        # artefacts exist (config disables them) so there is nothing else to publish, and
        # nothing that could carry the cleartext credential.
        if: ${{ !cancelled() && steps.detect-act.outputs.running != 'true' }}
        with:
          name: playwright-report-real-credential
          path: playwright/typescript/playwright-report/
          retention-days: 30
