name: Bruno Tests
on:
  workflow_dispatch:
    inputs:
      env:
        description: 'Target environment (staging = auto-approve, production = requires reviewer approval)'
        required: false
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      runner:
        description: 'Runner override (leave empty to use the RUNNER repo variable)'
        required: false
        default: ''
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  pull_request_review:
    # submitted: re-run when a new approval arrives; dismissed: re-evaluate when an approval is revoked
    types: [submitted, dismissed]
jobs:
  check-approval:
    if: github.repository == 'hubertgajewski/orwellstat' && vars.BRUNO == 'true' && github.event_name != 'workflow_dispatch'
    runs-on: ${{ inputs.runner || vars.RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 2
    permissions:
      pull-requests: read
    outputs:
      approved: ${{ steps.check.outputs.approved }}
    steps:
      - name: Check for PR approval
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          # Non-PR events (push) bypass the approval gate
          if [ -z "$PR_NUMBER" ]; then
            echo "approved=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Reviews are append-only history. A user's latest decisional review
          # (APPROVED/CHANGES_REQUESTED/DISMISSED) is authoritative; COMMENTED is ignored.
          # Gate opens only if ≥1 user's latest is APPROVED and no user's latest is CHANGES_REQUESTED.
          # `gh api --paginate` merges pages into a single array; `--jq` is not passed because
          # it would apply per-page and break the group_by across page boundaries.
          RESULT=$(gh api --paginate "repos/$GITHUB_REPOSITORY/pulls/$PR_NUMBER/reviews?per_page=100" \
            | jq '
              [.[] | select(.state == "APPROVED" or .state == "CHANGES_REQUESTED" or .state == "DISMISSED")]
              | group_by(.user.login)
              | map(max_by(.submitted_at) | .state)
              | (any(. == "APPROVED")) and (all(. != "CHANGES_REQUESTED"))
            ')
          if [ "$RESULT" = "true" ]; then
            echo "approved=true" >> "$GITHUB_OUTPUT"
          else
            echo "approved=false" >> "$GITHUB_OUTPUT"
          fi

  test:
    needs: check-approval
    if: github.repository == 'hubertgajewski/orwellstat' && always() && (needs.check-approval.outputs.approved == 'true' || github.event_name == 'workflow_dispatch')
    runs-on: ${{ inputs.runner || vars.RUNNER || 'ubuntu-latest' }}
    environment: ${{ inputs.env || 'staging' }}
    timeout-minutes: 10
    defaults:
      run:
        working-directory: bruno

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Create .env
        run: |
          echo "ORWELLSTAT_USER=${{ secrets.ORWELLSTAT_USER }}" >> .env
          echo "ORWELLSTAT_PASSWORD=${{ secrets.ORWELLSTAT_PASSWORD }}" >> .env
          echo "ORWELLSTAT_USER_EMPTY=${{ secrets.ORWELLSTAT_USER_EMPTY }}" >> .env
          echo "ORWELLSTAT_PASSWORD_EMPTY=${{ secrets.ORWELLSTAT_PASSWORD_EMPTY }}" >> .env
          echo "BASIC_AUTH_USER=${{ secrets.BASIC_AUTH_USER }}" >> .env
          echo "BASIC_AUTH_PASSWORD=${{ secrets.BASIC_AUTH_PASSWORD }}" >> .env

      - name: Run Bruno tests
        run: npx bru run --env "${{ vars.ENV }}"

      - name: Cleanup credentials
        if: always()
        run: rm -f .env
