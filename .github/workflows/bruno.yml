name: Bruno Tests
on:
  workflow_dispatch:
    inputs:
      runner:
        description: 'Runner to use'
        required: false
        default: 'self-hosted'
        type: choice
        options: [ubuntu-latest, self-hosted]
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  pull_request_review:
    # submitted: re-run when a new approval arrives; dismissed: re-evaluate when an approval is revoked
    types: [submitted, dismissed]
jobs:
  check-approval:
    if: vars.BRUNO == 'true' && github.event_name != 'workflow_dispatch'
    runs-on: self-hosted
    timeout-minutes: 2
    permissions:
      pull-requests: read
    outputs:
      approved: ${{ steps.check.outputs.approved }}
    steps:
      - name: Check for PR approval
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          # Non-PR events (push) bypass the approval gate
          if [ -z "$PR_NUMBER" ]; then
            echo "approved=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          COUNT=$(gh api "repos/$GITHUB_REPOSITORY/pulls/$PR_NUMBER/reviews" \
            --jq '[.[] | select(.state == "APPROVED")] | length')
          if [ "$COUNT" -gt 0 ]; then
            echo "approved=true" >> "$GITHUB_OUTPUT"
          else
            echo "approved=false" >> "$GITHUB_OUTPUT"
          fi

  test:
    needs: check-approval
    if: github.repository == 'hubertgajewski/orwellstat' && always() && (needs.check-approval.outputs.approved == 'true' || github.event_name == 'workflow_dispatch')
    runs-on: ${{ inputs.runner || 'self-hosted' }}
    timeout-minutes: 10
    defaults:
      run:
        working-directory: bruno

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Create .env
        run: |
          echo "ORWELLSTAT_USER=${{ secrets.ORWELLSTAT_USER }}" >> .env
          echo "ORWELLSTAT_PASSWORD=${{ secrets.ORWELLSTAT_PASSWORD }}" >> .env

      - name: Run Bruno tests
        run: npx bru run --env production

      - name: Cleanup credentials
        if: always()
        run: rm -f .env
