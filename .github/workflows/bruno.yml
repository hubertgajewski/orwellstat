name: Bruno Tests
on:
  workflow_dispatch:
    inputs:
      env:
        description: "Target environment (staging = auto-approve, production = requires reviewer approval)"
        required: false
        default: "staging"
        type: choice
        options:
          - staging
          - production
      runner:
        description: "Runner override (leave empty to use the RUNNER repo variable)"
        required: false
        default: ""
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    if: github.repository == 'hubertgajewski/orwellstat' && vars.BRUNO == 'true'
    runs-on: ${{ inputs.runner || vars.RUNNER || 'ubuntu-latest' }}
    environment: ${{ inputs.env || 'staging' }}
    timeout-minutes: 10
    defaults:
      run:
        working-directory: bruno

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          check-latest: true

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Create .env
        env:
          TARGET_ENV: ${{ inputs.env || 'staging' }}
          ORWELLSTAT_USER: ${{ secrets.ORWELLSTAT_USER }}
          ORWELLSTAT_PASSWORD: ${{ secrets.ORWELLSTAT_PASSWORD }}
          ORWELLSTAT_USER_EMPTY: ${{ secrets.ORWELLSTAT_USER_EMPTY }}
          ORWELLSTAT_PASSWORD_EMPTY: ${{ secrets.ORWELLSTAT_PASSWORD_EMPTY }}
          BASIC_AUTH_USER: ${{ secrets.BASIC_AUTH_USER }}
          BASIC_AUTH_PASSWORD: ${{ secrets.BASIC_AUTH_PASSWORD }}
        run: |
          {
            printf 'ORWELLSTAT_USER=%s\n' "$ORWELLSTAT_USER"
            printf 'ORWELLSTAT_PASSWORD=%s\n' "$ORWELLSTAT_PASSWORD"
            printf 'ORWELLSTAT_USER_EMPTY=%s\n' "$ORWELLSTAT_USER_EMPTY"
            printf 'ORWELLSTAT_PASSWORD_EMPTY=%s\n' "$ORWELLSTAT_PASSWORD_EMPTY"
          } >> .env
          if [ "$TARGET_ENV" = "staging" ]; then
            {
              printf 'BASIC_AUTH_USER=%s\n' "$BASIC_AUTH_USER"
              printf 'BASIC_AUTH_PASSWORD=%s\n' "$BASIC_AUTH_PASSWORD"
            } >> .env
          fi

      - name: Run Bruno tests
        env:
          BRUNO_ENV: ${{ vars.ENV }}
        run: npx bru run --env "$BRUNO_ENV"

      - name: Cleanup credentials
        if: always()
        run: rm -f .env
