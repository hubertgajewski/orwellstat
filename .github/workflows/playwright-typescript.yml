name: Playwright Typescript Tests
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  pull_request_review:
    # submitted: re-run when a new approval arrives; dismissed: re-evaluate when an approval is revoked
    types: [submitted, dismissed]
  schedule:
    # Runs at 03:00 UTC every Sunday
    - cron: '0 3 * * 0'
  workflow_dispatch:
    inputs:
      project:
        description: 'Browser project to test (all runs the full matrix)'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - chromium
          - firefox
          - webkit
      update_visual_baselines:
        description: 'Regenerate Linux visual baselines via --update-snapshots and commit them back to the branch (only the browser projects selected by the project input are updated)'
        type: boolean
        default: false
      ref:
        description: 'Branch to run on (defaults to triggering branch)'
        required: false
        default: ''
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  setup-matrix:
    needs: check-approval
    if: always() && (needs.check-approval.outputs.approved == 'true' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      matrix: ${{ steps.compute.outputs.matrix }}
    steps:
      - name: Compute matrix
        id: compute
        env:
          # Use env vars to avoid direct ${{ }} interpolation in the shell body (script injection risk)
          PROJECT: ${{ inputs.project }}
          EVENT: ${{ github.event_name }}
        run: |
          ALL='{"include":[{"project":"Chromium","browser":"chromium","id":"chromium"},{"project":"Firefox","browser":"firefox","id":"firefox"},{"project":"Webkit","browser":"webkit","id":"webkit"},{"project":"Mobile Chrome","browser":"chromium","id":"mobile-chrome"},{"project":"Mobile Safari","browser":"webkit","id":"mobile-safari"}]}'
          CHROMIUM='{"include":[{"project":"Chromium","browser":"chromium","id":"chromium"},{"project":"Mobile Chrome","browser":"chromium","id":"mobile-chrome"}]}'
          FIREFOX='{"include":[{"project":"Firefox","browser":"firefox","id":"firefox"}]}'
          WEBKIT='{"include":[{"project":"Webkit","browser":"webkit","id":"webkit"},{"project":"Mobile Safari","browser":"webkit","id":"mobile-safari"}]}'

          if [ "$EVENT" != "workflow_dispatch" ] || [ -z "$PROJECT" ] || [ "$PROJECT" = "all" ]; then
            echo "matrix=$ALL" >> "$GITHUB_OUTPUT"
          elif [ "$PROJECT" = "chromium" ]; then
            echo "matrix=$CHROMIUM" >> "$GITHUB_OUTPUT"
          elif [ "$PROJECT" = "firefox" ]; then
            echo "matrix=$FIREFOX" >> "$GITHUB_OUTPUT"
          elif [ "$PROJECT" = "webkit" ]; then
            echo "matrix=$WEBKIT" >> "$GITHUB_OUTPUT"
          else
            echo "matrix=$ALL" >> "$GITHUB_OUTPUT"
          fi

  check-approval:
    if: vars.PLAYWRIGHT_TYPESCRIPT == 'true' && github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions:
      pull-requests: read
    outputs:
      approved: ${{ steps.check.outputs.approved }}
    steps:
      - name: Check for PR approval
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          # Non-PR events (push, schedule, workflow_dispatch) bypass the approval gate
          if [ -z "$PR_NUMBER" ]; then
            echo "approved=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          COUNT=$(gh api "repos/$GITHUB_REPOSITORY/pulls/$PR_NUMBER/reviews" \
            --jq '[.[] | select(.state == "APPROVED")] | length')
          if [ "$COUNT" -gt 0 ]; then
            echo "approved=true" >> "$GITHUB_OUTPUT"
          else
            echo "approved=false" >> "$GITHUB_OUTPUT"
          fi

  test:
    needs: [setup-matrix, check-approval]
    if: always() && (needs.check-approval.outputs.approved == 'true' || github.event_name == 'workflow_dispatch')
    name: ${{ matrix.project }}
    timeout-minutes: 15
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup-matrix.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: 'npm'
          cache-dependency-path: playwright/typescript/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: playwright/typescript
      - name: Audit dependencies
        run: npm audit --audit-level=high
        working-directory: playwright/typescript
      - name: Install Playwright Browsers
        # chromium is always installed because the auth setup project (auth.setup.ts) has no
        # explicit browser configured and therefore defaults to Chromium. Every matrix job needs
        # it available to run the setup dependency. For Chromium/Mobile Chrome jobs the duplicate
        # is idempotent and harmless.
        run: npx playwright install --with-deps chromium ${{ matrix.browser }}
        working-directory: playwright/typescript
      - name: Run Playwright tests
        run: |
          if [ "${{ github.event.inputs.update_visual_baselines }}" = "true" ]; then
            npx playwright test tests/visual.spec.ts --update-snapshots --project="${{ matrix.project }}"
          else
            npx playwright test --project="${{ matrix.project }}"
          fi
        working-directory: playwright/typescript
        env:
          ORWELLSTAT_USER: ${{ secrets.ORWELLSTAT_USER }}
          ORWELLSTAT_PASSWORD: ${{ secrets.ORWELLSTAT_PASSWORD }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_DIAGNOSIS: ${{ vars.CLAUDE_DIAGNOSIS }}
      - name: Upload updated baselines
        if: ${{ github.event.inputs.update_visual_baselines == 'true' }}
        uses: actions/upload-artifact@v7
        with:
          name: visual-baselines-linux-${{ matrix.id }}
          path: playwright/typescript/tests/visual.spec.ts-snapshots/
      - name: Detect local act runner
        id: detect-act
        if: ${{ !cancelled() }}
        run: |
          if [ "${ACT}" = "true" ]; then
            echo "running=true" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/upload-artifact@v7
        if: ${{ !cancelled() && steps.detect-act.outputs.running != 'true' }}
        with:
          name: playwright-report-${{ matrix.id }}
          path: playwright/typescript/playwright-report/
          retention-days: 30

  commit-baselines:
    needs: test
    if: ${{ always() && github.event.inputs.update_visual_baselines == 'true' && needs.test.result != 'cancelled' }}
    timeout-minutes: 5
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/download-artifact@v8
        with:
          pattern: visual-baselines-linux-*
          path: playwright/typescript/tests/visual.spec.ts-snapshots/
          merge-multiple: true
      - name: Commit updated visual baselines
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add playwright/typescript/tests/visual.spec.ts-snapshots/
          if git diff --cached --quiet; then
            echo "No baseline changes to commit"
          else
            git commit -m "Update Linux visual baselines [skip ci]"
            git push origin HEAD:${{ github.event.inputs.ref || github.ref_name }}
          fi
