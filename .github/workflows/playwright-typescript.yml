name: Playwright Typescript Tests
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      update_visual_baselines:
        description: 'Regenerate Linux visual baselines for all 5 browser projects (--update-snapshots) and commit them back to the branch'
        type: boolean
        default: false
      ref:
        description: 'Branch to run on (defaults to triggering branch)'
        required: false
        default: ''
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - project: 'Chromium'
            browser: chromium
            id: chromium
          - project: 'Firefox'
            browser: firefox
            id: firefox
          - project: 'Webkit'
            browser: webkit
            id: webkit
          - project: 'Mobile Chrome'
            browser: chromium
            id: mobile-chrome
          - project: 'Mobile Safari'
            browser: webkit
            id: mobile-safari
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: 'npm'
          cache-dependency-path: playwright/typescript/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: playwright/typescript
      - name: Audit dependencies
        run: npm audit --audit-level=high
        working-directory: playwright/typescript
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps ${{ matrix.browser }}
        working-directory: playwright/typescript
      - name: Run Playwright tests
        run: |
          if [ "${{ github.event.inputs.update_visual_baselines }}" = "true" ]; then
            npx playwright test tests/visual.spec.ts --update-snapshots --project="${{ matrix.project }}"
          else
            npx playwright test --project="${{ matrix.project }}"
          fi
        working-directory: playwright/typescript
        env:
          ORWELLSTAT_USER: ${{ secrets.ORWELLSTAT_USER }}
          ORWELLSTAT_PASSWORD: ${{ secrets.ORWELLSTAT_PASSWORD }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_DIAGNOSIS: ${{ vars.CLAUDE_DIAGNOSIS }}
      - name: Upload updated baselines
        if: ${{ github.event.inputs.update_visual_baselines == 'true' }}
        uses: actions/upload-artifact@v7
        with:
          name: visual-baselines-linux-${{ matrix.id }}
          path: playwright/typescript/tests/visual.spec.ts-snapshots/
      - name: Detect local act runner
        id: detect-act
        if: ${{ !cancelled() }}
        run: |
          if [ "${ACT}" = "true" ]; then
            echo "running=true" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/upload-artifact@v7
        if: ${{ !cancelled() && steps.detect-act.outputs.running != 'true' }}
        with:
          name: playwright-report-${{ matrix.id }}
          path: playwright/typescript/playwright-report/
          retention-days: 30

  commit-baselines:
    needs: test
    if: ${{ github.event.inputs.update_visual_baselines == 'true' }}
    timeout-minutes: 5
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/download-artifact@v8
        with:
          pattern: visual-baselines-linux-*
          path: playwright/typescript/tests/visual.spec.ts-snapshots/
          merge-multiple: true
      - name: Commit updated visual baselines
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add playwright/typescript/tests/visual.spec.ts-snapshots/
          if git diff --cached --quiet; then
            echo "No baseline changes to commit"
          else
            git commit -m "Update Linux visual baselines [skip ci]"
            git push origin HEAD:${{ github.event.inputs.ref || github.ref_name }}
          fi
