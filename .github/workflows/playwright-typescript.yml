name: Playwright Typescript Tests
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    # Runs at 03:00 UTC every Sunday
    - cron: "0 3 * * 0"
  workflow_dispatch:
    inputs:
      env:
        description: "Target environment (staging = auto-approve, production = requires reviewer approval)"
        required: false
        default: "staging"
        type: choice
        options:
          - staging
          - production
      project:
        description: "Browser project to test (all runs the full matrix)"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - chromium
          - firefox
          - webkit
      update_visual_baselines:
        description: "Regenerate Linux visual baselines via --update-snapshots and commit them back to the branch (only the browser projects selected by the project input are updated)"
        type: boolean
        default: false
      ref:
        description: "Branch to run on (defaults to triggering branch)"
        required: false
        default: ""
      runner:
        description: "Runner override (leave empty to use the RUNNER repo variable)"
        required: false
        default: ""
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.update_visual_baselines == 'true' && format('{0}-baseline-{1}', github.workflow, github.event.inputs.ref || github.ref_name) || format('{0}-{1}', github.workflow, github.ref) }}
  cancel-in-progress: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.update_visual_baselines != 'true' }}

jobs:
  setup-matrix:
    if: github.repository == 'hubertgajewski/orwellstat'
    runs-on: ${{ inputs.runner || vars.RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 2
    outputs:
      matrix: ${{ steps.compute.outputs.matrix }}
      projects: ${{ steps.compute.outputs.projects }}
      total-shards: ${{ steps.compute.outputs.total-shards }}
    steps:
      - name: Compute matrix
        id: compute
        env:
          # Use env vars to avoid direct ${{ }} interpolation in the shell body (script injection risk)
          PROJECT: ${{ inputs.project }}
          EVENT: ${{ github.event_name }}
          UPDATE_BASELINES: ${{ github.event.inputs.update_visual_baselines }}
        run: |
          # snapToken mirrors Playwright's snapshot filename rule (project name with spaces → hyphens,
          # case preserved) so the upload-baselines step can glob per-project PNGs without cross-job collisions.
          # Visual-baseline runs collapse to total-shards=1 — sharding visual.spec.ts can leave a
          # shard with zero PNGs to upload for low-snapshot projects, tripping
          # `if-no-files-found: error` in playwright-run.yml. Regular runs fan out across 2 shards
          # to halve per-leg wall-clock; failed shards publish sanitized failure-evidence indexes
          # instead of raw Playwright reports because the jobs run with account and drain-token secrets.
          if [ "$UPDATE_BASELINES" = "true" ]; then
            TOTAL_SHARDS=1
          else
            TOTAL_SHARDS=2
          fi

          BASE_ALL='[{"project":"Chromium","browser":"chromium","id":"chromium","snapToken":"Chromium"},{"project":"Firefox","browser":"firefox","id":"firefox","snapToken":"Firefox"},{"project":"Webkit","browser":"webkit","id":"webkit","snapToken":"Webkit"},{"project":"Mobile Chrome","browser":"chromium","id":"mobile-chrome","snapToken":"Mobile-Chrome"},{"project":"Mobile Safari","browser":"webkit","id":"mobile-safari","snapToken":"Mobile-Safari"}]'
          BASE_CHROMIUM='[{"project":"Chromium","browser":"chromium","id":"chromium","snapToken":"Chromium"},{"project":"Mobile Chrome","browser":"chromium","id":"mobile-chrome","snapToken":"Mobile-Chrome"}]'
          BASE_FIREFOX='[{"project":"Firefox","browser":"firefox","id":"firefox","snapToken":"Firefox"}]'
          BASE_WEBKIT='[{"project":"Webkit","browser":"webkit","id":"webkit","snapToken":"Webkit"},{"project":"Mobile Safari","browser":"webkit","id":"mobile-safari","snapToken":"Mobile-Safari"}]'

          if [ "$EVENT" != "workflow_dispatch" ] || [ -z "$PROJECT" ] || [ "$PROJECT" = "all" ]; then
            BASE="$BASE_ALL"
          elif [ "$PROJECT" = "chromium" ]; then
            BASE="$BASE_CHROMIUM"
          elif [ "$PROJECT" = "firefox" ]; then
            BASE="$BASE_FIREFOX"
          elif [ "$PROJECT" = "webkit" ]; then
            BASE="$BASE_WEBKIT"
          else
            BASE="$BASE_ALL"
          fi

          # Cross-product each browser project with the shard range (1..TOTAL_SHARDS) so every
          # leg carries a unique (project, shard) pair; shard=1, total=1 collapses to the
          # un-sharded case used for visual baselines.
          MATRIX=$(echo "$BASE" | jq -c \
            --argjson total "$TOTAL_SHARDS" \
            '{include: [.[] as $entry | range(1; $total + 1) | $entry + {shard: ., total: $total}]}')
          # Per-project (un-sharded) variant feeds the auth-setup matrix so auth.setup.ts runs
          # exactly once per project regardless of shard count (#472).
          PROJECTS=$(echo "$BASE" | jq -c '{include: .}')
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          echo "projects=$PROJECTS" >> "$GITHUB_OUTPUT"
          echo "total-shards=$TOTAL_SHARDS" >> "$GITHUB_OUTPUT"

  auth-setup:
    # Decouples the auth login count from the shard count: one auth-setup leg per project
    # uploads `.auth/{populated,empty}.json` as `auth-state-<id>`; the test matrix downloads
    # them and runs with `--no-deps`, so adding shards no longer multiplies staging-side
    # logins. See #412 for the regression this restores parity against.
    needs: setup-matrix
    if: github.repository == 'hubertgajewski/orwellstat' && vars.PLAYWRIGHT_TYPESCRIPT == 'true' && needs.setup-matrix.result == 'success'
    name: auth-setup (${{ matrix.id }})
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup-matrix.outputs.projects) }}
    runs-on: ${{ inputs.runner || vars.RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 20
    environment: ${{ inputs.env || 'staging' }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}
      - uses: actions/setup-node@v7
        with:
          node-version-file: .node-version
          check-latest: true
          cache: "npm"
          cache-dependency-path: playwright/typescript/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: playwright/typescript
      - name: Set up Playwright Chromium
        # The setup project does not override browser/device, so it always runs in default
        # Chromium; its `use` block only disables trace/screenshot/video capture for sensitive
        # auth setup failures. Every auth-setup leg can share the chromium cache regardless of
        # `matrix.browser`, while test-leg caches are populated separately by `playwright-run.yml`.
        uses: ./.github/actions/setup-playwright-browser
        with:
          browser: chromium
      - name: Run auth.setup.ts
        id: run-auth-setup
        run: npx playwright test --project=setup
        working-directory: playwright/typescript
        env:
          ENV: ${{ vars.ENV }}
          ORWELLSTAT_USER: ${{ secrets.ORWELLSTAT_USER }}
          ORWELLSTAT_PASSWORD: ${{ secrets.ORWELLSTAT_PASSWORD }}
          ORWELLSTAT_USER_EMPTY: ${{ secrets.ORWELLSTAT_USER_EMPTY }}
          ORWELLSTAT_PASSWORD_EMPTY: ${{ secrets.ORWELLSTAT_PASSWORD_EMPTY }}
          BASIC_AUTH_USER: ${{ (inputs.env || 'staging') == 'staging' && secrets.BASIC_AUTH_USER || '' }}
          BASIC_AUTH_PASSWORD: ${{ (inputs.env || 'staging') == 'staging' && secrets.BASIC_AUTH_PASSWORD || '' }}
      - name: Collect failure evidence
        if: ${{ failure() && steps.run-auth-setup.outcome == 'failure' }}
        uses: ./.github/actions/collect-failure-evidence
        with:
          artifact-name: failure-evidence-auth-setup-${{ matrix.id }}
          project: ${{ matrix.id }}
          shard: auth-setup
          total-shards: "1"
          withhold-sensitive-details: "true"
      - name: Upload storage states
        uses: actions/upload-artifact@v7
        with:
          name: auth-state-${{ matrix.id }}
          path: playwright/typescript/.auth/
          retention-days: 1
          if-no-files-found: error
          # `.auth/` is a dotted directory; `upload-artifact@v7` skips hidden entries by
          # default and would publish an empty archive even after auth.setup.ts wrote the
          # JSON files (auth tests pass, but the upload step then trips `if-no-files-found`).
          include-hidden-files: true

  test:
    needs: [setup-matrix, auth-setup]
    if: github.repository == 'hubertgajewski/orwellstat' && vars.PLAYWRIGHT_TYPESCRIPT == 'true' && needs.setup-matrix.result == 'success' && needs.auth-setup.result == 'success'
    # Shard suffix in the job name so the Checks tab disambiguates the per-shard legs at a glance.
    name: test (${{ matrix.id }} ${{ matrix.shard }}/${{ matrix.total }})
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup-matrix.outputs.matrix) }}
    uses: ./.github/workflows/playwright-run.yml
    with:
      project: ${{ matrix.project }}
      browser: ${{ matrix.browser }}
      id: ${{ matrix.id }}
      snap-token: ${{ matrix.snapToken }}
      update-visual-baselines: ${{ github.event.inputs.update_visual_baselines == 'true' }}
      env: ${{ inputs.env || 'staging' }}
      runner: ${{ inputs.runner || vars.RUNNER || 'ubuntu-latest' }}
      ref: ${{ github.event.inputs.ref || github.ref }}
      shard: ${{ matrix.shard }}
      total-shards: ${{ matrix.total }}
    secrets: inherit

  commit-baselines:
    needs: test
    if: ${{ github.repository == 'hubertgajewski/orwellstat' && always() && github.event.inputs.update_visual_baselines == 'true' && needs.test.result != 'cancelled' }}
    timeout-minutes: 5
    runs-on: ${{ inputs.runner || vars.RUNNER || 'ubuntu-latest' }}
    concurrency:
      group: visual-baselines-${{ github.event.inputs.ref || github.ref_name }}
      cancel-in-progress: false
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/download-artifact@v8
        with:
          pattern: visual-baselines-linux-*
          path: playwright/typescript/tests/visual.spec.ts-snapshots/
          merge-multiple: true
      - name: Commit updated visual baselines
        env:
          TARGET_REF: ${{ github.event.inputs.ref || github.ref_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add playwright/typescript/tests/visual.spec.ts-snapshots/
          if git diff --cached --quiet; then
            echo "No baseline changes to commit"
          else
            git check-ref-format --branch "$TARGET_REF"
            git commit -m "Update Linux visual baselines [skip ci]"
            git push origin "HEAD:${TARGET_REF}"
          fi
