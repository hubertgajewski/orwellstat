name: Playwright Typescript Tests
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    # Runs at 03:00 UTC every Sunday
    - cron: "0 3 * * 0"
  workflow_dispatch:
    inputs:
      env:
        description: "Target environment (staging = auto-approve, production = requires reviewer approval)"
        required: false
        default: "staging"
        type: choice
        options:
          - staging
          - production
      project:
        description: "Browser project to test (all runs the full matrix)"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - chromium
          - firefox
          - webkit
      update_visual_baselines:
        description: "Regenerate Linux visual baselines via --update-snapshots and commit them back to the branch (only the browser projects selected by the project input are updated)"
        type: boolean
        default: false
      ref:
        description: "Branch to run on (defaults to triggering branch)"
        required: false
        default: ""
      runner:
        description: "Runner override (leave empty to use the RUNNER repo variable)"
        required: false
        default: ""
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  setup-matrix:
    if: github.repository == 'hubertgajewski/orwellstat'
    runs-on: ${{ inputs.runner || vars.RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 2
    outputs:
      matrix: ${{ steps.compute.outputs.matrix }}
    steps:
      - name: Compute matrix
        id: compute
        env:
          # Use env vars to avoid direct ${{ }} interpolation in the shell body (script injection risk)
          PROJECT: ${{ inputs.project }}
          EVENT: ${{ github.event_name }}
        run: |
          # snapToken mirrors Playwright's snapshot filename rule (project name with spaces → hyphens,
          # case preserved) so the upload-baselines step can glob per-project PNGs without cross-job collisions.
          ALL='{"include":[{"project":"Chromium","browser":"chromium","id":"chromium","snapToken":"Chromium"},{"project":"Firefox","browser":"firefox","id":"firefox","snapToken":"Firefox"},{"project":"Webkit","browser":"webkit","id":"webkit","snapToken":"Webkit"},{"project":"Mobile Chrome","browser":"chromium","id":"mobile-chrome","snapToken":"Mobile-Chrome"},{"project":"Mobile Safari","browser":"webkit","id":"mobile-safari","snapToken":"Mobile-Safari"}]}'
          CHROMIUM='{"include":[{"project":"Chromium","browser":"chromium","id":"chromium","snapToken":"Chromium"},{"project":"Mobile Chrome","browser":"chromium","id":"mobile-chrome","snapToken":"Mobile-Chrome"}]}'
          FIREFOX='{"include":[{"project":"Firefox","browser":"firefox","id":"firefox","snapToken":"Firefox"}]}'
          WEBKIT='{"include":[{"project":"Webkit","browser":"webkit","id":"webkit","snapToken":"Webkit"},{"project":"Mobile Safari","browser":"webkit","id":"mobile-safari","snapToken":"Mobile-Safari"}]}'

          if [ "$EVENT" != "workflow_dispatch" ] || [ -z "$PROJECT" ] || [ "$PROJECT" = "all" ]; then
            echo "matrix=$ALL" >> "$GITHUB_OUTPUT"
          elif [ "$PROJECT" = "chromium" ]; then
            echo "matrix=$CHROMIUM" >> "$GITHUB_OUTPUT"
          elif [ "$PROJECT" = "firefox" ]; then
            echo "matrix=$FIREFOX" >> "$GITHUB_OUTPUT"
          elif [ "$PROJECT" = "webkit" ]; then
            echo "matrix=$WEBKIT" >> "$GITHUB_OUTPUT"
          else
            echo "matrix=$ALL" >> "$GITHUB_OUTPUT"
          fi

  test:
    needs: setup-matrix
    if: github.repository == 'hubertgajewski/orwellstat' && vars.PLAYWRIGHT_TYPESCRIPT == 'true' && needs.setup-matrix.result == 'success'
    name: test (${{ matrix.id }})
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup-matrix.outputs.matrix) }}
    uses: ./.github/workflows/playwright-run.yml
    with:
      project: ${{ matrix.project }}
      browser: ${{ matrix.browser }}
      id: ${{ matrix.id }}
      snap-token: ${{ matrix.snapToken }}
      update-visual-baselines: ${{ github.event.inputs.update_visual_baselines == 'true' }}
      env: ${{ inputs.env || 'staging' }}
      runner: ${{ inputs.runner || vars.RUNNER || 'ubuntu-latest' }}
      ref: ${{ github.event.inputs.ref || github.ref }}
    secrets: inherit

  commit-baselines:
    needs: test
    if: ${{ github.repository == 'hubertgajewski/orwellstat' && always() && github.event.inputs.update_visual_baselines == 'true' && needs.test.result != 'cancelled' }}
    timeout-minutes: 5
    runs-on: ${{ inputs.runner || vars.RUNNER || 'ubuntu-latest' }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/download-artifact@v8
        with:
          pattern: visual-baselines-linux-*
          path: playwright/typescript/tests/visual.spec.ts-snapshots/
          merge-multiple: true
      - name: Commit updated visual baselines
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add playwright/typescript/tests/visual.spec.ts-snapshots/
          if git diff --cached --quiet; then
            echo "No baseline changes to commit"
          else
            git commit -m "Update Linux visual baselines [skip ci]"
            git push origin HEAD:${{ github.event.inputs.ref || github.ref_name }}
          fi
