name: Update Visual Baselines
on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to update baselines on'
        required: false
        default: 'main'
      runner:
        description: 'Runner to use'
        required: false
        default: 'self-hosted'
        type: choice
        options: [ubuntu-latest, self-hosted]

jobs:
  update:
    if: github.repository == 'hubertgajewski/orwellstat'
    timeout-minutes: 30
    runs-on: ${{ inputs.runner || 'self-hosted' }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.branch || github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: 'npm'
          cache-dependency-path: playwright/typescript/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: playwright/typescript
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
        working-directory: playwright/typescript
      - name: Regenerate visual baselines
        run: npx playwright test tests/visual.spec.ts --update-snapshots
        working-directory: playwright/typescript
        env:
          ORWELLSTAT_USER: ${{ secrets.ORWELLSTAT_USER }}
          ORWELLSTAT_PASSWORD: ${{ secrets.ORWELLSTAT_PASSWORD }}
      - name: Commit updated baselines
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add playwright/typescript/tests/visual.spec.ts-snapshots/
          if git diff --cached --quiet; then
            echo "No baseline changes to commit"
          else
            git commit -m "Update Linux visual baselines [skip ci]"
            git push
          fi
