name: Playwright Typescript Lint and Types
on:
  push:
    branches: [main, master]
    paths:
      - 'playwright/typescript/**'
      - '.github/workflows/playwright-typescript-lint.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'playwright/typescript/**'
      - '.github/workflows/playwright-typescript-lint.yml'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint-and-types:
    if: github.repository == 'hubertgajewski/orwellstat' && vars.PLAYWRIGHT_TYPESCRIPT == 'true'
    runs-on: ${{ vars.RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 5
    defaults:
      run:
        working-directory: playwright/typescript
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: 'npm'
          cache-dependency-path: playwright/typescript/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Prettier format check
        run: npm run format:check
      - name: TypeScript type check
        run: npx tsc --noEmit
