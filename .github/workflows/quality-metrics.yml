name: Quality Metrics Dashboard
on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 6 AM UTC
  workflow_dispatch:

jobs:
  calculate:
    if: vars.QUALITY_METRICS == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: quality-metrics
      cancel-in-progress: false  # let the current run finish; don't race on git push
    permissions:
      issues: read
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Install missing tools
        # No-op on GitHub-hosted runners (gh pre-installed); installs for act containers
        run: type -p gh > /dev/null || (sudo apt-get update -qq && sudo apt-get install -y gh)

      - name: Generate quality metrics report
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/generate-quality-metrics.py

      - name: Commit and push metrics
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add QUALITY_METRICS.md quality-metrics-history.json
          git diff --staged --quiet || git commit -m "Update quality metrics report"
          git push origin HEAD
