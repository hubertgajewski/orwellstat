name: Quality Metrics Dashboard
on:
  schedule:
    - cron: '0 6 1 * *'  # 1st of every month at 6 AM UTC
  workflow_dispatch:
    inputs:
      runner:
        description: 'Runner override (leave empty to use the RUNNER repo variable)'
        required: false
        default: ''

jobs:
  calculate:
    if: github.repository == 'hubertgajewski/orwellstat' && vars.QUALITY_METRICS == 'true'
    runs-on: ${{ inputs.runner || vars.RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 10
    concurrency:
      group: quality-metrics
      cancel-in-progress: false  # let the current run finish; don't race on git push
    permissions:
      issues: read
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v6

      - name: Install missing tools
        # No-op on GitHub-hosted runners (gh pre-installed); installs for act containers
        run: type -p gh > /dev/null || (sudo apt-get update -qq && sudo apt-get install -y gh)

      - name: Generate quality metrics report
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/generate-quality-metrics.py

      - name: Open metrics pull request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add QUALITY_METRICS.md quality-metrics-history.json
          if git diff --staged --quiet; then
            echo "No changes to report"
            exit 0
          fi
          REPORT_DATE=$(date +%Y-%m-%d)
          BRANCH="chore/quality-metrics-${REPORT_DATE}"
          git checkout -b "$BRANCH"
          git commit -m "Update quality metrics report ${REPORT_DATE}"
          git push origin "$BRANCH"
          gh pr create --title "Update quality metrics report ${REPORT_DATE}" --body "Automated monthly quality metrics update for ${REPORT_DATE}." --label "ci"
