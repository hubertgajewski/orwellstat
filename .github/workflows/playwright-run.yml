name: Playwright Run

# Reusable workflow that encapsulates a single matrix entry's Playwright run:
# checkout → install Node + browsers + xmllint → run tests → upload sanitized failure evidence.
# Callers pass the matrix entry as discrete inputs so this workflow has no implicit knowledge of
# the caller's matrix shape.

on:
  workflow_call:
    inputs:
      project:
        description: "Playwright project name (e.g. 'Chromium', 'Mobile Safari')"
        type: string
        required: true
      browser:
        description: "Browser binary to install (chromium / firefox / webkit)"
        type: string
        required: true
      id:
        description: "Slug used in artefact names (e.g. 'chromium', 'mobile-safari')"
        type: string
        required: true
      snap-token:
        description: "Snapshot filename suffix (Playwright's project-name → hyphenated form)"
        type: string
        required: true
      update-visual-baselines:
        description: "Regenerate Linux baselines via --update-snapshots and upload them"
        type: boolean
        default: false
      env:
        description: "GitHub Environment to scope secrets/vars to"
        type: string
        default: "staging"
      runner:
        description: "runs-on label"
        type: string
        default: "ubuntu-latest"
      ref:
        description: "Git ref to check out (empty = workflow's own ref)"
        type: string
        default: ""
      shard:
        description: "1-based index of this shard (1..total-shards). Tests run with --shard=<shard>/<total-shards> when total-shards > 1."
        type: number
        default: 1
      total-shards:
        description: "Total number of shards across which specs are split for this matrix entry. 1 = no sharding."
        type: number
        default: 1
    secrets:
      ORWELLSTAT_USER:
        required: true
      ORWELLSTAT_PASSWORD:
        required: true
      ORWELLSTAT_USER_EMPTY:
        required: false
      ORWELLSTAT_PASSWORD_EMPTY:
        required: false
      ORWELLSTAT_EMAIL:
        required: false
      BASIC_AUTH_USER:
        required: false
      BASIC_AUTH_PASSWORD:
        required: false
      ANTHROPIC_API_KEY:
        required: false
      GEMINI_API_KEY:
        required: false
      ORWELLSTAT_DRAIN_TOKEN:
        required: false

jobs:
  run:
    name: tests
    timeout-minutes: 20
    runs-on: ${{ inputs.runner }}
    environment: ${{ inputs.env }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.ref }}
      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          check-latest: true
          cache: "npm"
          cache-dependency-path: playwright/typescript/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: playwright/typescript
      - name: Audit dependencies
        run: npm audit --audit-level=high
        working-directory: playwright/typescript
      - name: Set up Playwright ${{ inputs.browser }}
        # Reuses the ~600 MB ms-playwright tarball across runs and shards. The key is bound to
        # the installed Playwright version plus the per-leg browser slug, so unrelated lockfile
        # churn does not force a cold browser install. The restore prefix lets a renamed key
        # reuse an existing cache; the cache-miss branch still runs `install --with-deps` so
        # Playwright can fetch the correct binaries if the restored cache is stale.
        uses: ./.github/actions/setup-playwright-browser
        with:
          browser: ${{ inputs.browser }}
      - name: Install libxml2-utils (xmllint)
        # xmllint provides local XHTML DTD validation used by validation.spec.ts — the default
        # path; avoids POSTing authenticated pages to validator.w3.org on every CI run.
        run: sudo apt-get install -y libxml2-utils
      - name: Download auth state
        # `playwright-typescript.yml`'s `auth-setup` job authenticates once per project and
        # uploads `.auth/{populated,empty}.json` as `auth-state-<id>` (#472). Downloading them
        # here lets the test command pass `--no-deps`, which skips the in-leg `setup` project
        # so the matrix legs do not re-authenticate against staging on every shard.
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          name: auth-state-${{ inputs.id }}
          path: playwright/typescript/.auth/
      - name: Validate auth state
        id: validate-auth-state
        # Failed-job reruns can reuse artifacts from an earlier attempt. Validate the downloaded
        # storage state metadata before the shard starts; if it is missing or stale, regenerate
        # locally so authenticated tests do not land on the public login page.
        run: |
          MAX_AUTH_STATE_AGE_SECONDS=3600

          should_regenerate_auth_state() {
            if [ ! -s .auth/populated.json ] || [ ! -s .auth/empty.json ] || [ ! -s .auth/metadata.json ]; then
              echo "Auth state files or metadata are missing; regenerating before shard run."
              return 0
            fi

            GENERATED_AT=$(jq -r '.generatedAt // empty' .auth/metadata.json 2>/dev/null || true)
            if [ -z "$GENERATED_AT" ]; then
              echo "Auth state metadata has no generatedAt value; regenerating before shard run."
              return 0
            fi

            GENERATED_EPOCH=$(node --input-type=module -e "const ms = Date.parse(process.argv[1]); if (!Number.isFinite(ms)) process.exit(1); console.log(Math.floor(ms / 1000));" "$GENERATED_AT" 2>/dev/null || echo 0)
            if [ "$GENERATED_EPOCH" -eq 0 ]; then
              echo "Auth state metadata has an unparsable generatedAt value; regenerating before shard run."
              return 0
            fi

            NOW_EPOCH=$(date +%s)
            AUTH_STATE_AGE=$((NOW_EPOCH - GENERATED_EPOCH))

            if [ "$AUTH_STATE_AGE" -gt "$MAX_AUTH_STATE_AGE_SECONDS" ]; then
              echo "Auth state metadata is stale; regenerating before shard run."
              return 0
            fi

            return 1
          }

          if should_regenerate_auth_state; then
            echo "regenerate=true" >> "$GITHUB_OUTPUT"
          else
            echo "Auth state metadata is fresh; using downloaded state."
            echo "regenerate=false" >> "$GITHUB_OUTPUT"
          fi
        working-directory: playwright/typescript
      - name: Set up Playwright Chromium for auth regeneration
        # The setup project uses Playwright's default Chromium browser. Non-Chromium shard legs
        # normally install only their project browser, so install Chromium only when auth setup
        # must be rerun locally.
        if: ${{ steps.validate-auth-state.outputs.regenerate == 'true' && inputs.browser != 'chromium' }}
        uses: ./.github/actions/setup-playwright-browser
        with:
          browser: chromium
      - name: Regenerate auth state
        if: ${{ steps.validate-auth-state.outputs.regenerate == 'true' }}
        run: |
          cleanup_auth_regeneration_artifacts() {
            rm -rf .auth-regeneration-results blob-report playwright-report test-results
          }

          trap cleanup_auth_regeneration_artifacts EXIT
          cleanup_auth_regeneration_artifacts
          npx playwright test --project=setup --reporter=line --output=.auth-regeneration-results
        working-directory: playwright/typescript
        env:
          ENV: ${{ vars.ENV }}
          ORWELLSTAT_USER: ${{ secrets.ORWELLSTAT_USER }}
          ORWELLSTAT_PASSWORD: ${{ secrets.ORWELLSTAT_PASSWORD }}
          ORWELLSTAT_USER_EMPTY: ${{ secrets.ORWELLSTAT_USER_EMPTY }}
          ORWELLSTAT_PASSWORD_EMPTY: ${{ secrets.ORWELLSTAT_PASSWORD_EMPTY }}
          BASIC_AUTH_USER: ${{ inputs.env == 'staging' && secrets.BASIC_AUTH_USER || '' }}
          BASIC_AUTH_PASSWORD: ${{ inputs.env == 'staging' && secrets.BASIC_AUTH_PASSWORD || '' }}
      - name: Run Playwright tests
        id: run-playwright-tests
        run: |
          SHARD_ARGS=()
          if [ "${TOTAL_SHARDS}" -gt 1 ]; then
            SHARD_ARGS+=("--shard=${SHARD}/${TOTAL_SHARDS}")
          fi
          if [ "${UPDATE_BASELINES}" = "true" ]; then
            # Normal baseline refresh uses Playwright's default update mode. For one-off
            # mask-only / covered-area changes, temporarily use `--update-snapshots=all`
            # to force rewriting existing PNGs, then revert that workflow change.
            npx playwright test tests/visual.spec.ts --update-snapshots --no-deps --project="${PROJECT}" "${SHARD_ARGS[@]}"
          else
            npx playwright test --no-deps --project="${PROJECT}" "${SHARD_ARGS[@]}"
          fi
        working-directory: playwright/typescript
        env:
          # Move workflow inputs through env so the shell body never embeds raw `${{ }}`
          # interpolation (script-injection hygiene; matches the pattern in
          # playwright-typescript.yml's setup-matrix).
          PROJECT: ${{ inputs.project }}
          SHARD: ${{ inputs.shard }}
          TOTAL_SHARDS: ${{ inputs.total-shards }}
          UPDATE_BASELINES: ${{ inputs.update-visual-baselines }}
          ENV: ${{ vars.ENV }}
          ORWELLSTAT_USER: ${{ secrets.ORWELLSTAT_USER }}
          ORWELLSTAT_PASSWORD: ${{ secrets.ORWELLSTAT_PASSWORD }}
          ORWELLSTAT_USER_EMPTY: ${{ secrets.ORWELLSTAT_USER_EMPTY }}
          ORWELLSTAT_PASSWORD_EMPTY: ${{ secrets.ORWELLSTAT_PASSWORD_EMPTY }}
          ORWELLSTAT_EMAIL: ${{ secrets.ORWELLSTAT_EMAIL }}
          BASIC_AUTH_USER: ${{ inputs.env == 'staging' && secrets.BASIC_AUTH_USER || '' }}
          BASIC_AUTH_PASSWORD: ${{ inputs.env == 'staging' && secrets.BASIC_AUTH_PASSWORD || '' }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ORWELLSTAT_DRAIN_TOKEN: ${{ secrets.ORWELLSTAT_DRAIN_TOKEN }}
          AI_PROVIDER: ${{ vars.AI_PROVIDER }}
          AI_DIAGNOSIS: ${{ vars.AI_DIAGNOSIS }}
          AI_MODEL_FAST: ${{ vars.AI_MODEL_FAST }}
          AI_MODEL_STRONG: ${{ vars.AI_MODEL_STRONG }}
          VALIDATE_REMOTE: ${{ vars.VALIDATE_REMOTE }}
      - name: Upload updated baselines
        if: ${{ inputs.update-visual-baselines }}
        uses: actions/upload-artifact@v7
        with:
          # Per-project filename globs already prevent cross-project collisions (see #347);
          # per-shard suffix is the equivalent guard within a single project — each shard
          # regenerates only the visual tests it owns.
          name: visual-baselines-linux-${{ inputs.id }}-${{ inputs.shard }}
          path: playwright/typescript/tests/visual.spec.ts-snapshots/*-${{ inputs.snap-token }}-linux.png
          # Fail loudly if snap-token ever drifts from the real filename rule (e.g. a project rename
          # that forgets to update the matrix JSON) — default `warn` would silently lose baselines.
          if-no-files-found: error
      - name: Collect failure evidence
        if: ${{ failure() && steps.run-playwright-tests.outcome == 'failure' }}
        uses: ./.github/actions/collect-failure-evidence
        with:
          artifact-name: failure-evidence-${{ inputs.id }}-${{ inputs.shard }}
          project: ${{ inputs.project }}
          shard: ${{ inputs.shard }}
          total-shards: ${{ inputs.total-shards }}
          withhold-sensitive-details: "true"
