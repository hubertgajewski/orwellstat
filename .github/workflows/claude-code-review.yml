name: Claude Code Review
on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CLAUDE_CODE_FORCE_GLOBAL_CACHE: true

jobs:
  review:
    if: github.actor != 'dependabot[bot]' && vars.AI_REVIEW == 'true'
    timeout-minutes: 10
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Resolve reviewer provider settings
        id: reviewer
        env:
          AI_REVIEW_PROVIDER: ${{ vars.AI_REVIEW_PROVIDER }}
          AI_REVIEW_MODEL: ${{ vars.AI_REVIEW_MODEL }}
          HAS_OPENROUTER_KEY: ${{ secrets.OPENROUTER_API_KEY != '' }}
          HAS_ANTHROPIC_KEY: ${{ secrets.ANTHROPIC_API_KEY != '' }}
        run: |
          provider="${AI_REVIEW_PROVIDER:-openrouter}"
          case "$provider" in
            openrouter)
              if [ "$HAS_OPENROUTER_KEY" != "true" ]; then
                echo "::error::AI_REVIEW_PROVIDER=openrouter but OPENROUTER_API_KEY secret is not set"
                exit 1
              fi
              default_model="qwen/qwen3.6-plus"
              base_url="https://openrouter.ai/api/v1"
              ;;
            anthropic)
              if [ "$HAS_ANTHROPIC_KEY" != "true" ]; then
                echo "::error::AI_REVIEW_PROVIDER=anthropic but ANTHROPIC_API_KEY secret is not set"
                exit 1
              fi
              default_model="claude-sonnet-4-6"
              base_url=""
              ;;
            *)
              echo "::error::Unknown AI_REVIEW_PROVIDER '$provider' (expected: openrouter | anthropic)"
              exit 1
              ;;
          esac
          model="${AI_REVIEW_MODEL:-$default_model}"
          {
            echo "provider=$provider"
            echo "model=$model"
            echo "base_url=$base_url"
          } >> "$GITHUB_OUTPUT"

      - uses: anthropics/claude-code-action@v1
        env:
          ANTHROPIC_BASE_URL: ${{ steps.reviewer.outputs.base_url }}
        with:
          anthropic_api_key: ${{ steps.reviewer.outputs.provider == 'openrouter' && secrets.OPENROUTER_API_KEY || secrets.ANTHROPIC_API_KEY }}
          track_progress: true
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Please review this pull request. The repo is a multi-framework E2E test suite for OrwellStat.
            Focus on:
            - Playwright test correctness (selectors, assertions, fixture usage)
            - Page Object Model conventions (extending AbstractPage, static url/title/accessKey)
            - TypeScript quality (types, imports, path aliases)
            - Potential bugs or flaky test patterns
            - Consistency with existing patterns in the codebase

            Always finish by submitting a formal GitHub review using `gh pr review` — this is mandatory regardless of what other tools you used:
            - `gh pr review <number> --approve -b "..."` if the PR looks good
            - `gh pr review <number> --request-changes -b "..."` if changes are needed
            - `gh pr review <number> --comment -b "..."` if you have feedback but no verdict
            You may also use `mcp__github_inline_comment__create_inline_comment` to highlight specific code issues, but it does not replace the required `gh pr review` call.
            Only post GitHub review/comments - don't submit review text as messages.

          claude_args: |
            --model ${{ steps.reviewer.outputs.model }} --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr review:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
