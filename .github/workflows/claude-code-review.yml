name: Claude Code Review
on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CLAUDE_CODE_FORCE_GLOBAL_CACHE: true

jobs:
  review:
    if: github.actor != 'dependabot[bot]' && vars.AI_REVIEW == 'true'
    # 15 min (was 10) to accommodate a back-to-back primary + fallback run when the
    # primary (proxy/Minimax) skips the mandate on a trivial diff; see #293.
    timeout-minutes: 15
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    env:
      # Signatures appended to reviews by the Backfill step when the model forgets.
      # Two variants — one per tier — so the signature always matches the tier that
      # actually produced the review. They must stay byte-identical to the strings
      # emitted in the tier-specific prompts below or the Backfill string compare
      # silently no-ops.
      PRIMARY_SIGNATURE: "_Reviewed by ${{ vars.ANTHROPIC_BASE_URL != '' && 'proxy' || 'native Anthropic' }}/${{ vars.ANTHROPIC_DEFAULT_SONNET_MODEL || 'claude-sonnet-4-6' }}_"
      FALLBACK_SIGNATURE: "_Reviewed by native Anthropic/claude-sonnet-4-6 (fallback)_"
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Validate reviewer configuration
        env:
          BASE_URL: ${{ vars.ANTHROPIC_BASE_URL }}
          SONNET: ${{ vars.ANTHROPIC_DEFAULT_SONNET_MODEL }}
          HAIKU: ${{ vars.ANTHROPIC_DEFAULT_HAIKU_MODEL }}
        run: |
          if [ -n "$BASE_URL" ] && { [ -z "$SONNET" ] || [ -z "$HAIKU" ]; }; then
            echo "::error::ANTHROPIC_BASE_URL is set, so both ANTHROPIC_DEFAULT_SONNET_MODEL and ANTHROPIC_DEFAULT_HAIKU_MODEL must also be set. Claude Code's defaults (claude-sonnet-4-6, claude-haiku-4-5) don't exist on proxies like OpenRouter."
            exit 1
          fi

      # Primary reviewer — runs on the configured model (typically the cheap
      # OpenRouter Minimax preset). Cost ~$0.038/run on substantive diffs (PR #241)
      # but occasionally skips the MANDATORY `gh pr review` on trivial diffs.
      # See #284 for the guard and #293 for the fallback rationale.
      #
      # Auth convention:
      # - Native Anthropic (ANTHROPIC_BASE_URL empty): anthropic_api_key input carries
      #   ANTHROPIC_API_KEY (x-api-key header). ANTHROPIC_AUTH_TOKEN left empty.
      # - Proxy (ANTHROPIC_BASE_URL set, e.g. OpenRouter): ANTHROPIC_AUTH_TOKEN carries
      #   the proxy key (Bearer header, per OpenRouter docs). anthropic_api_key input
      #   ALSO carries the same proxy key — required to satisfy claude-code-action@v1's
      #   own pre-flight env validator which hard-requires a non-empty ANTHROPIC_API_KEY.
      #   The Anthropic SDK sends both headers with the proxy key; OpenRouter accepts
      #   either. No cross-provider leak: the Anthropic key is only ever emitted when
      #   ANTHROPIC_BASE_URL is empty.
      # Pinned to v1.0.103 (4e5d8b13): later @v1 SHAs (>=v1.0.104, claude-cli 2.1.118+)
      # ignore ANTHROPIC_DEFAULT_SONNET_MODEL for internal Agent SDK sub-calls and leak
      # native Sonnet billing through OpenRouter. Do NOT bump to @v1 until upstream fix
      # lands and is verified clean for 48h. See issue #375.
      - uses: anthropics/claude-code-action@4e5d8b13ca281a6d163cdb287d8917b216e00d6f # v1.0.103
        id: claude_code_action
        env:
          ANTHROPIC_BASE_URL: ${{ vars.ANTHROPIC_BASE_URL }}
          ANTHROPIC_AUTH_TOKEN: ${{ vars.ANTHROPIC_BASE_URL != '' && secrets.OPENROUTER_API_KEY || '' }}
          ANTHROPIC_DEFAULT_SONNET_MODEL: ${{ vars.ANTHROPIC_DEFAULT_SONNET_MODEL }}
          ANTHROPIC_DEFAULT_HAIKU_MODEL: ${{ vars.ANTHROPIC_DEFAULT_HAIKU_MODEL }}
        with:
          anthropic_api_key: ${{ (vars.ANTHROPIC_BASE_URL != '' && secrets.OPENROUTER_API_KEY) || (vars.ANTHROPIC_BASE_URL == '' && secrets.ANTHROPIC_API_KEY) || '' }}
          track_progress: false
          prompt: |
            You are executing a code review of pull request #${{ github.event.pull_request.number }}
            in ${{ github.repository }}. This is an autonomous task: complete it using tool calls
            only. Do not reply in prose. Do not say "I will analyze". Do not output review text
            as a message.

            MANDATORY final action — invoke `gh pr review ${{ github.event.pull_request.number }}`
            exactly once with a BINARY verdict:
              - `--approve -b "..."`          default — pick this when the PR meets the
                                              criteria. Minor nits do not block approval.
              - `--request-changes -b "..."`  pick this ONLY when the PR has a concrete
                                              blocking issue that must be fixed before merge.
              - `--comment -b "..."`          reserved for drafts / WIP PRs or PRs where the
                                              diff is structurally unreviewable (mass renames,
                                              generated files). Do not use as a fallback.

            You are the reviewer; produce a verdict. Do not add disclaimers like
            "As an AI, I cannot approve" — your role is to evaluate code quality
            against the criteria, not defer to human judgment.

            Task completion is measured by whether that call succeeds. If the final
            `gh pr review` is not invoked, the task has failed.

            Steps:
              1. Fetch the diff with `gh pr diff ${{ github.event.pull_request.number }}`.
              2. Read the diff and identify issues against these criteria:
                 - Playwright test correctness (selectors, assertions, fixture usage)
                 - Page Object Model conventions (extending AbstractPage, static
                   url/title/accessKey)
                 - TypeScript quality (types, imports, path aliases)
                 - Potential bugs or flaky test patterns
                 - Consistency with existing patterns in the codebase
              3. (Optional) attach line-anchored comments via
                 `mcp__github_inline_comment__create_inline_comment`.
              4. Call `gh pr review` per the mandate above. The review body must summarise
                 findings and must be under 2000 characters. Every claim must be verifiable
                 in the diff — do not invent issues.

            Append this as the final line of the review body, verbatim:
            `${{ env.PRIMARY_SIGNATURE }}`

          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr review:*),Bash(gh pr diff:*),Bash(gh pr view:*)"

      # Detect the silent-mandate-skip failure mode (#284): primary action exited
      # `success` but no `claude[bot]` review exists at HEAD_SHA. On detection we
      # trigger a one-shot fallback on native Sonnet 4.6, which honors the mandate
      # reliably. Skipped when the action itself failed (e.g. 401) so the primary
      # error stays the single signal.
      - name: Check if fallback needed
        id: primary_check
        if: steps.claude_code_action.conclusion == 'success'
        env:
          GH_TOKEN: ${{ secrets.REVIEW_GUARD_PAT || secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          count=$(gh api \
            "repos/${REPO}/pulls/${PR_NUMBER}/reviews?per_page=100" \
            --jq "[.[] | select(.user.login==\"claude[bot]\" and .commit_id==\"${HEAD_SHA}\")] | length")
          if [ "$count" = "0" ]; then
            echo "::warning::primary reviewer posted 0 reviews at ${HEAD_SHA}; triggering native-Sonnet fallback (see #293)"
            echo "need_fallback=true" >> "$GITHUB_OUTPUT"
          else
            echo "primary posted ${count} review(s); fallback not needed"
            echo "need_fallback=false" >> "$GITHUB_OUTPUT"
          fi

      # Fallback reviewer — native Anthropic Sonnet 4.6. Only fires when the primary
      # run succeeded but posted zero reviews (the trivial-diff no-op documented in
      # #293). Cost ~$0.29/run on PR #241 (~7.6× primary); triggered only on no-op
      # cases so expected net cost = primary cost + (no-op rate × fallback cost).
      # Requires `ANTHROPIC_API_KEY` secret in addition to `OPENROUTER_API_KEY`.
      #
      # The prompt is kept in sync with the primary above on purpose — the same
      # review criteria must apply regardless of which tier produced the verdict.
      # Only the signature line differs so Backfill can distinguish the two tiers.
      - name: Claude Code Review (native Sonnet fallback)
        id: claude_code_action_fallback
        if: steps.claude_code_action.conclusion == 'success' && steps.primary_check.outputs.need_fallback == 'true'
        # Pinned to v1.0.103 (4e5d8b13) — see comment on the primary step above. #375
        uses: anthropics/claude-code-action@4e5d8b13ca281a6d163cdb287d8917b216e00d6f # v1.0.103
        env:
          # Clear proxy config so the Anthropic SDK hits the native endpoint.
          ANTHROPIC_BASE_URL: ''
          ANTHROPIC_AUTH_TOKEN: ''
          ANTHROPIC_DEFAULT_SONNET_MODEL: ''
          ANTHROPIC_DEFAULT_HAIKU_MODEL: ''
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          track_progress: false
          prompt: |
            You are executing a code review of pull request #${{ github.event.pull_request.number }}
            in ${{ github.repository }}. This is an autonomous task: complete it using tool calls
            only. Do not reply in prose. Do not say "I will analyze". Do not output review text
            as a message.

            MANDATORY final action — invoke `gh pr review ${{ github.event.pull_request.number }}`
            exactly once with a BINARY verdict:
              - `--approve -b "..."`          default — pick this when the PR meets the
                                              criteria. Minor nits do not block approval.
              - `--request-changes -b "..."`  pick this ONLY when the PR has a concrete
                                              blocking issue that must be fixed before merge.
              - `--comment -b "..."`          reserved for drafts / WIP PRs or PRs where the
                                              diff is structurally unreviewable (mass renames,
                                              generated files). Do not use as a fallback.

            You are the reviewer; produce a verdict. Do not add disclaimers like
            "As an AI, I cannot approve" — your role is to evaluate code quality
            against the criteria, not defer to human judgment.

            Task completion is measured by whether that call succeeds. If the final
            `gh pr review` is not invoked, the task has failed.

            Steps:
              1. Fetch the diff with `gh pr diff ${{ github.event.pull_request.number }}`.
              2. Read the diff and identify issues against these criteria:
                 - Playwright test correctness (selectors, assertions, fixture usage)
                 - Page Object Model conventions (extending AbstractPage, static
                   url/title/accessKey)
                 - TypeScript quality (types, imports, path aliases)
                 - Potential bugs or flaky test patterns
                 - Consistency with existing patterns in the codebase
              3. (Optional) attach line-anchored comments via
                 `mcp__github_inline_comment__create_inline_comment`.
              4. Call `gh pr review` per the mandate above. The review body must summarise
                 findings and must be under 2000 characters. Every claim must be verifiable
                 in the diff — do not invent issues.

            Append this as the final line of the review body, verbatim:
            `${{ env.FALLBACK_SIGNATURE }}`

          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr review:*),Bash(gh pr diff:*),Bash(gh pr view:*)"

      # Backfills the signature line mandated by the prompts above when the model
      # fails to append it. Accepts either tier's signature as "already signed",
      # and picks the signature matching the tier that actually ran when backfilling.
      # See #259 (original signature backfill) and #293 (two-tier retry).
      - name: Backfill review signature
        if: always()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.REVIEW_GUARD_PAT || secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          REPO: ${{ github.repository }}
          FALLBACK_RAN: ${{ steps.claude_code_action_fallback.conclusion == 'success' }}
          # PRIMARY_SIGNATURE / FALLBACK_SIGNATURE inherited from job-level env.
        run: |
          set -u
          reviews_json=$(gh api \
            "repos/${REPO}/pulls/${PR_NUMBER}/reviews?per_page=100" \
            --jq "[.[] | select(.user.login==\"claude[bot]\" and .commit_id==\"${HEAD_SHA}\")] | sort_by(.submitted_at) | reverse")
          count=$(jq 'length' <<<"$reviews_json")
          if [ "$count" = "0" ]; then
            echo "No claude[bot] reviews at ${HEAD_SHA}; nothing to guard."
            exit 0
          fi
          target=$(jq -c 'map(select(.body|length>0)) | .[0] // empty' <<<"$reviews_json")
          if [ -z "$target" ]; then
            echo "::warning::No non-empty claude[bot] review at ${HEAD_SHA}; skipping."
            exit 0
          fi
          target_id=$(jq -r '.id' <<<"$target")
          target_body=$(jq -r '.body' <<<"$target")
          last_line=$(printf '%s' "$target_body" | awk 'NF{line=$0} END{print line}')
          # A review is "signed" if its last line matches either tier's signature —
          # the review is valid regardless of which tier produced it.
          if [ "$last_line" = "$PRIMARY_SIGNATURE" ] || [ "$last_line" = "$FALLBACK_SIGNATURE" ]; then
            echo "Signature present on review ${target_id}; no-op."
            exit 0
          fi
          # Pick the signature matching the tier that actually ran. If fallback
          # completed, the (latest) review is from fallback; otherwise it is from
          # the primary.
          if [ "$FALLBACK_RAN" = "true" ]; then
            sig="$FALLBACK_SIGNATURE"
          else
            sig="$PRIMARY_SIGNATURE"
          fi
          echo "::warning::Review ${target_id} missing signature; backfilling."
          new_body="${target_body}"$'\n\n'"${sig}"
          if ! jq -n --arg b "$new_body" '{body:$b}' | gh api \
              --method PUT \
              -H "Accept: application/vnd.github+json" \
              "repos/${REPO}/pulls/${PR_NUMBER}/reviews/${target_id}" \
              --input - >/dev/null; then
            echo "::error::PUT /reviews/${target_id} failed — GITHUB_TOKEN likely lacks cross-App edit rights. Create a fine-grained PAT with Pull requests: read & write, store as secret REVIEW_GUARD_PAT."
          fi

      # Guards against the silent failure mode where claude-code-action@v1
      # exits cleanly but the model skipped the mandated `gh pr review` call,
      # leaving the PR with a green review job and zero reviewer verdicts.
      # See issue #284. Runs after primary + fallback so it only fires when
      # BOTH tiers failed to post a review. Skipped when the primary action
      # itself failed (e.g. 401 on a self-workflow-edit PR) so the primary
      # error stays the single signal.
      - name: Fail if no review was posted
        if: steps.claude_code_action.conclusion == 'success'
        env:
          GH_TOKEN: ${{ secrets.REVIEW_GUARD_PAT || secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          count=$(gh api \
            "repos/${REPO}/pulls/${PR_NUMBER}/reviews?per_page=100" \
            --jq "[.[] | select(.user.login==\"claude[bot]\" and .commit_id==\"${HEAD_SHA}\")] | length")
          if [ "$count" = "0" ]; then
            echo "::error::reviewer (primary + fallback) posted 0 reviews on PR ${PR_NUMBER} @ ${HEAD_SHA} — both proxy and native paths ignored the gh pr review mandate"
            exit 1
          fi
          echo "Found ${count} claude[bot] review(s) at ${HEAD_SHA}."

      - name: Report reviewer configuration
        if: always()
        env:
          BASE_URL: ${{ vars.ANTHROPIC_BASE_URL }}
          SONNET: ${{ vars.ANTHROPIC_DEFAULT_SONNET_MODEL }}
          HAIKU: ${{ vars.ANTHROPIC_DEFAULT_HAIKU_MODEL }}
          FALLBACK_RAN: ${{ steps.claude_code_action_fallback.conclusion == 'success' }}
        run: |
          if [ -z "$BASE_URL" ]; then
            provider="native Anthropic"; url="<native>"
          else
            provider="proxy"; url="$BASE_URL"
          fi
          echo "provider=$provider base_url=$url sonnet=${SONNET:-<default>} haiku=${HAIKU:-<default>} fallback_ran=${FALLBACK_RAN}"
